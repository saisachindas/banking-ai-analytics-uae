# Banking AI Analytics Platform - Configuration
# YAML configuration file for all platform settings

platform:
  name: "Banking AI Analytics Platform - UAE"
  version: "1.0.0"
  environment: "development"
  debug: true

database:
  # Connection URL
  # PostgreSQL: postgresql://user:password@localhost:5432/uae_banking
  # SQLite: sqlite:///./uae_banking.db
  url: "sqlite:///./uae_banking.db"
  
  # Connection pooling
  pool_size: 10
  max_overflow: 20
  pool_recycle: 3600
  
  # Echo SQL statements (for debugging)
  echo: false

models:
  # Text generation model for summaries and responses
  text_generation:
    name: "google/flan-t5-base"
    max_length: 150
    temperature: 0.1
  
  # Embeddings model for RAG
  embeddings:
    name: "sentence-transformers/all-MiniLM-L6-v2"
    cache_folder: "models/embeddings"
  
  # Summarization model
  summarization:
    name: "facebook/bart-large-cnn"
    max_length: 150
  
  # Device for inference (cpu or cuda)
  device: "cpu"

analytics:
  # Customer Segmentation
  segmentation:
    n_clusters: 4
    random_state: 42
    output_path: "data/processed/customer_segments.csv"
  
  # Credit Risk Scoring
  credit_risk:
    test_size: 0.2
    npl_threshold: 0.5
    model_path: "models/credit_risk_model.pkl"
    scaler_path: "models/credit_risk_scaler.pkl"
  
  # Fraud Detection
  fraud_detection:
    lookback_days: 90
    contamination: 0.05
    n_estimators: 100
    random_state: 42
    output_path: "data/processed/fraud_alerts.csv"
  
  # Branch Performance
  branch_performance:
    output_path: "data/processed/branch_performance.csv"
  
  # Digital Channel Analytics
  digital_channels:
    output_path: "data/processed/digital_channel_kpis.csv"
  
  # Product Profitability
  product_profitability:
    output_path: "data/processed/product_profitability_report.csv"

genai:
  # KYC Summary Generator
  kyc_summary:
    model: "google/flan-t5-large"
    max_length: 150
  
  # Complaint Summary Generator
  complaint_summary:
    model: "facebook/bart-large-cnn"
    max_length: 150
  
  # Credit Advisory RAG
  credit_advisory:
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    policy_docs_path: "data/raw/policy_docs"
    index_path: "data/processed/credit_policy_index"
    retriever_k: 3

agents:
  # LangChain agent configuration
  agent_type: "zero_shot_react"
  max_iterations: 5
  verbose: true
  
  # Customer Support Agent
  customer_support:
    enabled: true
    tools:
      - "get_account_balance"
      - "get_recent_transactions"
      - "raise_complaint"
      - "check_card_status"
  
  # Fraud Investigation Agent
  fraud_investigation:
    enabled: true
    tools:
      - "get_flagged_transactions"
      - "get_customer_risk_profile"
      - "get_transaction_pattern"
      - "flag_account_for_review"
  
  # Compliance Agent
  compliance:
    enabled: true
    tools:
      - "get_kyc_status"
      - "get_aml_risk"
      - "list_expiring_documents"
      - "get_compliance_dashboard"

logging:
  level: "INFO"
  format: "[%(asctime)s] [%(name)s] [%(levelname)s] %(message)s"
  file: "logs/banking_ai.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

paths:
  data_raw: "data/raw"
  data_processed: "data/processed"
  models: "models"
  logs: "logs"
  config: "config"

security:
  # Database encryption
  encrypt_sensitive_fields: true
  
  # Audit logging
  audit_logging: true
  audit_log_path: "logs/audit.log"
  
  # PII masking
  mask_pii_in_logs: true

performance:
  # Batch processing
  batch_size: 1000
  
  # Connection pooling
  use_connection_pool: true
  
  # Caching
  enable_cache: true
  cache_ttl: 3600  # seconds
